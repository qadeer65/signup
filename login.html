<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
font-family:Arial,sans-serif;
}

.login-box{
width:350px;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>

</head>
<div><a href="index.html"></a></div>
<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="12345678"){

window.location="index.html";

}else{

alert("Invalid Username or Password");

}

}
</script>

</body>
</html>
