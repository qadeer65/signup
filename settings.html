<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.settings-box{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
max-width:600px;
margin:auto;
}

.settings-box h2{
margin-bottom:20px;
}

.settings-box label{
display:block;
margin-top:15px;
font-weight:bold;
}

.settings-box input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

.settings-box button{
margin-top:20px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.settings-box button:hover{
background:#1d4ed8;
}
</style>

</head>
<body>

<div class="sidebar">

<h2>Admin</h2>

<ul>
<li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
<li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
<li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
<li><a href="customers.html"><i class="fas fa-users"></i> Customers</a></li>
<li><a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a></li>
<li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
</ul>

</div>

<div class="main">

<div class="navbar">
<h2>Settings</h2>
</div>

<div class="settings-box">

<h2>Admin Profile</h2>

<label>Full Name</label>
<input type="text" value="Admin User">

<label>Email</label>
<input type="email" value="admin@gmail.com">

<label>New Password</label>
<input type="password" placeholder="Enter new password">

<label>Confirm Password</label>
<input type="password" placeholder="Confirm password">

<button onclick="saveSettings()">Save Settings</button>

</div>

</div>

<script>
function saveSettings(){
alert("Settings Saved Successfully!");
}
</script>

</body>
</html>
