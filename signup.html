<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#2563eb;
    font-family:Arial,sans-serif;
}

form{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

p{
    text-align:center;
}

a{
    color:#2563eb;
    text-decoration:none;
}
    </style>
</head>
<body>
 <form onsubmit="return signup()">

<input type="text" placeholder="Full Name" required>
<br>
<input type="email" placeholder="Email" required>
<br>
<input type="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

<script>
function signup(){

    alert("Signup Successful!");

    window.location.href = "index.html";

    return false; // Form submit hone se page reload nahi hoga
}
</script>
        </form>
    </div>
</div>

</body>
</html>
